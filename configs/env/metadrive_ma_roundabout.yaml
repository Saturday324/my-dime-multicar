#@package _global_
# Multi-agent roundabout profile.
# Keep this separate from single-agent `env=metadrive_roundabout`.
env_name: metadrive/MultiAgentRoundaboutEnv
eval_enabled: false

env_kwargs:
  # Core runtime
  use_render: false
  start_seed: 0
  num_scenarios: 1
  horizon: 1000

  # Multi-agent controls
  num_agents: 8
  allow_respawn: false

  # Traffic controls
  traffic_density: 0.0
  random_traffic: false
  need_inverse_traffic: false
  traffic_mode: trigger

  # Match current single-agent checkpoint observation shape (if reusing weights)
  vehicle_config:
    lidar:
      num_lasers: 240
      num_others: 0
      distance: 50
